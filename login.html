<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snopiz - Login</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Back to home nav -->
    <nav style="padding: 1rem 2rem; position: absolute; top: 0; left: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" class="logo">
            <i class="fas fa-cube text-cyan"></i>
            Snopiz
        </a>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
            <i class="fas fa-moon"></i>
        </button>
    </nav>

    <!-- Auth Container -->
    <section class="auth-section">
        <div class="auth-container glass-panel">
            <div class="auth-header">
                <h2>Welcome <span class="text-gradient">Back</span></h2>
                <p>Sign in to access your digital dashboard and licenses.</p>
            </div>

            <div class="auth-body">
                <button class="btn btn-google btn-block">
                    <svg class="google-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        <path fill="none" d="M0 0h48v48H0z"/>
                    </svg>
                    Continue with Google
                </button>
                <a href="index.html" class="btn btn-block" style="background:transparent; border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.6); margin-top:1rem; text-align:center; display:block; text-decoration:none;">
                    Back to Home
                </a>
            </div>
        </div>
    </section>

    <!-- Loading Overlay -->
    <div id="auth-loading" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
        <div style="text-align:center; color:#fff;">
            <div style="width:48px; height:48px; border:3px solid rgba(255,255,255,0.2); border-top-color:#00e5ff; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem;"></div>
            <p style="font-family:'Outfit',sans-serif; font-size:0.95rem; opacity:0.8;">Signing you in…</p>
        </div>
    </div>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <!-- Shared UI script (theme toggle etc.) -->
    <script src="script.js"></script>

    <!-- Firebase Auth (ESM module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
        import {
            getAuth,
            GoogleAuthProvider,
            signInWithPopup,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // ── Firebase Config ──────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyDVa7moAuXKT1wB1HKWtfEPFsrdud572QI",
            authDomain: "snopiz-login.firebaseapp.com",
            projectId: "snopiz-login",
            storageBucket: "snopiz-login.firebasestorage.app",
            messagingSenderId: "334056573720",
            appId: "1:334056573720:web:2989ab8dfb986b5b7b6c6d",
            measurementId: "G-X9VYYSPZDK"
        };

        const app      = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth     = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ── UI References ────────────────────────────────────────────────
        const googleBtn    = document.querySelector('.btn-google');
        const loadingEl    = document.getElementById('auth-loading');
        const authBody     = document.querySelector('.auth-body');

        function showLoading(v) {
            loadingEl.style.display = v ? 'flex' : 'none';
        }

        // ── Google Sign-In ───────────────────────────────────────────────
        googleBtn.addEventListener('click', async () => {
            showLoading(true);
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                showLoading(false);
                if (err.code !== 'auth/popup-closed-by-user') {
                    alert('Sign-in failed: ' + err.message);
                }
            }
        });

        // ── Auth State Observer ──────────────────────────────────────────
        onAuthStateChanged(auth, (user) => {
            showLoading(false);
            if (user) {
                // Swap card content to a welcome state
                authBody.innerHTML = `
                    <div style="text-align:center; padding:1rem 0;">
                        <img src="${user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || 'U') + '&background=00e5ff&color=0a0f1e'}"
                             alt="Avatar"
                             style="width:72px; height:72px; border-radius:50%; border:3px solid #00e5ff; margin-bottom:1rem; object-fit:cover;">
                        <h3 style="font-family:'Outfit',sans-serif; margin:0 0 0.25rem; font-size:1.1rem; color:#fff;">
                            ${user.displayName || 'User'}
                        </h3>
                        <p style="font-size:0.85rem; opacity:0.6; margin:0 0 1.5rem;">${user.email}</p>
                        <button id="dash-btn" class="btn btn-primary btn-block" style="display:block; text-align:center; margin-bottom:0.75rem; width:100%;">
                            Go to Dashboard
                        </button>
                        <button id="sign-out-btn" class="btn btn-block"
                            style="background:transparent; border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.6); cursor:pointer;">
                            Sign Out
                        </button>
                    </div>`;

                document.getElementById('dash-btn').addEventListener('click', () => {
                    window.open('index.html', '_blank');
                });

                document.getElementById('sign-out-btn').addEventListener('click', () => {
                    signOut(auth).then(() => {
                        window.location.reload();
                    });
                });

                // Also update the card header
                document.querySelector('.auth-header h2').innerHTML =
                    'Welcome, <span class="text-gradient">' + (user.displayName?.split(' ')[0] || 'Back') + '</span>';
                document.querySelector('.auth-header p').textContent =
                    'You are signed in successfully.';
            }
        });
    </script>
</body>
</html>
